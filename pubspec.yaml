name: bookworm
description: Aplicación de libros BookWorm
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'
  flutter: ">=3.38.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.4.10
  
  # Google
  google_sign_in: ^6.1.6
  google_maps_flutter: ^2.5.1
  googleapis: ^11.2.0
  
  # UI
  url_launcher: ^6.2.4
  fl_chart: ^1.1.1
  connectivity_plus: ^6.0.0
  image_picker: ^1.1.2
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # HTTP
  http: ^1.2.2
  
  # Utilities
  intl: ^0.19.0
  
  # Audio y PDF
  just_audio: ^0.10.5
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/googleLogo.png

dependency_overrides:
  sign_in_with_apple: ^7.0.1